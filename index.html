// ===== 결제선생(페이민트) 연동 =====
// 주의: apiKey/hash는 절대 브라우저에 두지 않습니다. 반드시 백엔드 프록시(payssam-proxy.js)를 거칩니다.

function newBillId(){
  // 문자/숫자 20자리 이내, 중복 방지용 ID
  return ('R'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)).slice(0,20);
}
function billLabel(st){
  return ({sending:'발송중',sent:'발송됨',failed:'발송실패',manual:'수동발송',paid:'결제완료',destroyed:'파기됨',cancelled:'결제취소'})[st]||st;
}
// 신청확정 알림톡 발송 요청 (서버 경유). 실패해도 신청 자체는 정상 처리됨.
async function notifyStudent(entry){
  try{
    const items=[
      ...(entry.classes||[]).map(c=>`${c.name}${c.session?` ${c.session}회차`:''}${c.date?` (${c.date}${c.time?' '+c.time:''})`:''}`),
      ...(entry.vodItems||[]).map(v=>`[VOD] ${v.name}${v.cheomchak?' (첨삭포함)':''}`)
    ];
    await fetch('/api/notify-student',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:entry.studentName,phone:entry.phone,items,total:entry.totalWon,payMethod:entry.payMethod})});
  }catch(e){}
}
async function payssamCall(base, action, payload){
  const url=base.replace(/\/+$/,'');
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,...payload})});
  let data={}; try{data=await res.json();}catch(e){}
  return {ok:res.ok, ...data};
}

const CSS=`
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f7f4ef;color:#111;}
.nv{background:#00662b;display:flex;align-items:center;gap:6px;padding:10px 14px;position:sticky;top:0;z-index:200;}
.nv-mo{flex:1;font-size:14px;font-weight:700;color:white;text-align:center;}
.nv-ar{background:rgba(255,255,255,.14);border:none;color:white;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
.nv-ar:hover{background:rgba(255,255,255,.25);}
.nv-adm{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.35);color:white;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#ddd;}
.dh{background:#00662b;color:rgba(255,255,255,.6);font-size:10px;font-weight:700;text-align:center;padding:7px 0;}
.dc{background:#fff;min-height:72px;padding:3px 2px 4px;}
.dc.emp{background:#f5f5f5;}.dc.tod{background:#FFFDE7;}
.dn{font-size:10px;font-weight:700;color:#bbb;display:block;margin-bottom:3px;}
.dc.tod .dn{color:#00662b;}.dsu .dn{color:#EF5350;}.dsa .dn{color:#42A5F5;}
.cc{border-left:3px solid;border-radius:3px;padding:3px 14px 3px 4px;margin-bottom:3px;cursor:pointer;font-size:9.5px;line-height:1.4;transition:all .15s;position:relative;user-select:none;}
.cc:hover{filter:brightness(.92);}.cc.sel{outline:2.5px solid #00662b;outline-offset:1px;}
.cc-n{font-weight:700;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cc-s{font-size:8.5px;opacity:.72;display:block;}
.cc-ck{position:absolute;top:3px;right:3px;font-size:10px;font-weight:900;color:#00662b;}
.footnote{font-size:11.5px;color:#bbb;padding:10px 14px 6px;line-height:1.7;}
.vod-section{background:white;border-top:1px solid #eee;padding:20px 14px 24px;}
.price-chip{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-right:6px;margin-bottom:12px;}
.chip-c{background:#E8F5EE;color:#004d20;border:1px solid #00662b;}
.chip-n{background:#F7F4EF;color:#6A7080;border:1px solid #DDD7CE;}
.vod-item{border:1.5px solid #ddd;border-radius:10px;padding:12px 13px;margin-bottom:10px;background:#fff;transition:border .15s;}
.vod-item.sel{border-color:#00662b;background:#f5fbf7;}
.vod-name{font-size:13px;font-weight:700;color:#111;margin-bottom:8px;}
.vod-opts{display:flex;gap:7px;}
.vod-opt{flex:1;padding:8px 6px;border:1.5px solid #ddd;border-radius:7px;font-size:12px;font-weight:700;color:#999;cursor:pointer;font-family:inherit;background:white;text-align:center;line-height:1.4;transition:all .15s;}
.vod-opt.on-c{border-color:#00662b;background:#E8F5EE;color:#004d20;}
.vod-opt.on-n{border-color:#555;background:#F7F4EF;color:#111;}
.sbar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:white;box-shadow:0 -3px 20px rgba(0,0,0,.1);padding:12px 16px;display:flex;align-items:center;gap:12px;}
.sbar-info{flex:1;}.sbar-cnt{font-size:16px;font-weight:700;color:#111;display:block;}.sbar-pr{font-size:13px;color:#00662b;font-weight:700;}
.sbar-btn{background:#00662b;color:white;border:none;border-radius:8px;padding:13px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .2s;}
.sbar-btn:hover{background:#004d20;}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:500;}
.sheet{background:#fff;width:100%;max-width:520px;border-radius:16px 16px 0 0;padding:20px 18px 40px;max-height:96vh;overflow-y:auto;}
@media(min-width:540px){.ov{align-items:center;}.sheet{border-radius:12px;margin:16px;}}
.sh-hd{display:flex;align-items:center;margin-bottom:18px;}
.sh-tit{font-size:18px;font-weight:700;color:#111;flex:1;}
.sh-cl{background:none;border:none;font-size:24px;color:#bbb;cursor:pointer;line-height:1;}
.sel-box{background:#f7f7f7;border-radius:8px;padding:10px 12px;margin-bottom:10px;display:flex;flex-direction:column;gap:7px;}
.sel-item{display:flex;align-items:center;justify-content:space-between;}
.sel-nm{font-size:13px;color:#111;font-weight:500;}
.sel-pr{font-size:11px;color:#00662b;font-weight:700;margin-left:6px;}
.sel-x{background:none;border:none;color:#bbb;cursor:pointer;font-size:18px;padding:0 2px;line-height:1;}
.co-sec-t{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#999;display:block;margin-bottom:7px;}
.price-box{background:#f5fbf7;border-radius:8px;padding:12px 14px;margin-bottom:18px;display:flex;align-items:baseline;justify-content:space-between;}
.price-lbl{font-size:13px;color:#004d20;font-weight:600;}.price-note{font-size:11px;color:#999;display:block;margin-top:2px;}.price-v{font-size:22px;font-weight:700;color:#111;}
.divhr{border:none;border-top:1px solid #eee;margin:16px 0;}
.fg{margin-bottom:14px;}.lb{font-size:12px;font-weight:700;color:#111;display:block;margin-bottom:6px;}
.inp{width:100%;background:#f5f5f5;border:1.5px solid transparent;border-radius:8px;padding:11px 13px;font-size:14px;font-family:inherit;color:#111;outline:none;transition:border .2s;}
.inp:focus{border-color:#00662b;background:#fff;}.inp::placeholder{color:#bbb;}
.pay-row{display:flex;gap:8px;}
.pay-btn{flex:1;padding:10px;border:1.5px solid #ddd;border-radius:8px;background:#fff;font-size:13px;font-weight:700;color:#888;cursor:pointer;font-family:inherit;transition:all .15s;}
.pay-btn.on{border-color:#00662b;background:#00662b;color:#fff;}
.acct{background:#f5fbf7;border-radius:8px;padding:14px;margin:16px 0;}
.acct-t{font-size:10.5px;font-weight:700;color:#999;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;}
.acct-row{display:flex;align-items:center;justify-content:space-between;}
.acct-num{font-size:16px;font-weight:700;color:#111;}.acct-bank{font-size:11.5px;color:#888;margin-top:3px;}
.acct-cp{background:#00662b;color:#fff;border:none;border-radius:4px;padding:7px 13px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;}
.notice{font-size:12px;color:#888;background:#f5f5f5;border-left:3px solid #00662b;padding:10px 12px;border-radius:0 6px 6px 0;margin-top:12px;line-height:1.7;}
.sub-btn{width:100%;padding:14px;background:#00662b;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:14px;transition:background .2s;}
.sub-btn:hover{background:#004d20;}.sub-btn:disabled{background:#ccc;color:#999;cursor:not-allowed;}
.err{font-size:12.5px;color:#e53935;margin-top:8px;}
.done{text-align:center;padding:20px 0 8px;}.done-ic{font-size:52px;margin-bottom:16px;}.done-t{font-size:22px;font-weight:700;color:#111;margin-bottom:10px;}
.done-sub{font-size:14px;color:#888;line-height:1.75;margin-bottom:16px;}
.done-acct{background:#f5fbf7;border-radius:8px;padding:14px;text-align:left;margin:0 0 14px;}
.done-acct-t{font-size:11px;color:#999;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
.done-acct-n{font-size:15px;font-weight:700;color:#111;}.done-acct-b{font-size:12px;color:#888;margin-top:2px;}
.done-hi{font-size:13px;color:#004d20;font-weight:700;background:#E8F5EE;padding:10px 14px;border-radius:8px;display:block;margin-bottom:22px;line-height:1.6;}
.adm{max-width:720px;margin:0 auto;padding:16px 14px 80px;}
.atabs{display:flex;border-bottom:2px solid #ddd;margin-bottom:18px;overflow-x:auto;}
.atab{padding:10px 14px;font-size:13px;font-weight:600;color:#999;background:none;border:none;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;}
.atab.on{color:#111;border-bottom-color:#00662b;}
.acard{background:#fff;border-radius:8px;padding:14px 15px;border:1px solid #ddd;margin-bottom:10px;}
.rtag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-right:6px;}
.rtag-cash{background:#E8F5EE;color:#004d20;}.rtag-card{background:#E3F2FD;color:#0D47A1;}
.cp-btn{background:#f5f5f5;border:1px solid #ddd;border-radius:4px;padding:3px 8px;font-size:11px;font-weight:700;color:#111;cursor:pointer;font-family:inherit;margin-left:6px;}
.del-btn{background:none;border:none;color:#ccc;cursor:pointer;font-size:17px;padding:2px 4px;}
.del-btn:hover{color:#e53935;}
.add-box{background:#fff;border:1.5px dashed #00662b;border-radius:8px;padding:16px;margin-bottom:12px;}
.ins{width:100%;background:#f5f5f5;border:1.5px solid transparent;border-radius:6px;padding:9px 12px;font-size:13px;font-family:inherit;color:#111;outline:none;margin-bottom:8px;}
.ins:focus{border-color:#00662b;background:#fff;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.add-btn{background:#00662b;color:#fff;border:none;border-radius:6px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.add-open{background:#00662b;color:#fff;border:none;border-radius:6px;padding:10px 15px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:12px;}
.xbtn{background:transparent;border:1.5px solid #ddd;border-radius:6px;padding:10px 14px;font-size:13px;cursor:pointer;font-family:inherit;color:#888;}
.set-box{background:#fff;border-radius:8px;padding:20px;border:1px solid #ddd;}
.set-h{font-size:13px;font-weight:700;color:#111;margin-bottom:8px;}
.set-hint{font-size:11px;color:#888;margin-top:4px;margin-bottom:16px;}
.sv-btn{background:#00662b;color:#fff;border:none;border-radius:6px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.sv-ok{font-size:13px;color:#00662b;font-weight:600;margin-left:10px;}
.cls-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
.empty-st{text-align:center;padding:40px 20px;color:#bbb;font-size:14px;}
.loading-sc{display:flex;align-items:center;justify-content:center;height:100vh;font-size:28px;background:#f7f4ef;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#00662b;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;pointer-events:none;}
.login-w{max-width:300px;margin:80px auto;background:#fff;border-radius:12px;padding:28px 24px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.1);}
.login-w h3{font-size:17px;font-weight:700;margin-bottom:18px;}
.pw-err{font-size:12px;color:#e53935;margin-bottom:8px;}
.paid-toggle{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid;}
`;

function App() {
  const now=new Date();
  const [yr,setYr]=useState(2026);
  const [mo,setMo]=useState(7);
  const [cls,setCls]=useState([]);
  const [regs,setRegs]=useState([]);
  const [vodList,setVodList]=useState([]);
  const [pw,setPw]=useState('910124');
  const [wh,setWh]=useState('');
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState('student');
  const [adminTab,setAdminTab]=useState('regs');
  const [pwInput,setPwInput]=useState('');
  const [pwErr,setPwErr]=useState(false);
  const [selected,setSelected]=useState(new Set());
  const [selVOD,setSelVOD]=useState(new Map());
  const [sName,setSName]=useState('');
  const [sPhone,setSPhone]=useState('');
  const [checkout,setCheckout]=useState(false);
  const [payMethod,setPayMethod]=useState('카드');
  const [cashReceipt,setCashReceipt]=useState('');
  const [cardPhone,setCardPhone]=useState('');
  const [coErr,setCoErr]=useState('');
  const [coDone,setCoDone]=useState(false);
  const [doneTotal,setDoneTotal]=useState(0);
  const [payssamUrl,setPayssamUrl]=useState('');
  const [newPayssamUrl,setNewPayssamUrl]=useState('');
  const [billState,setBillState]=useState('idle');
  const [billInfo,setBillInfo]=useState(null);
  const [adding,setAdding]=useState(false);
  const [newCls,setNewCls]=useState({date:'',time:'20:00',name:'',session:'',type:'before',notes:''});
  const [addingVOD,setAddingVOD]=useState(false);
  const [newVOD,setNewVOD]=useState('');
  const [payFilter,setPayFilter]=useState('all');
  const [newPw,setNewPw]=useState('');
  const [newWh,setNewWh]=useState('');
  const [svOk,setSvOk]=useState(false);
  const [toast,setToast]=useState('');
  const [lookupPhone,setLookupPhone]=useState('');
  const [lookupResults,setLookupResults]=useState(null);
  const [lookupView,setLookupView]=useState(false);
  const [siteMode,setSiteMode]=useState('survey'); // 'survey' = 수요조사 중(시간표 숨김) | 'signup' = 수강신청 오픈
  const [surveys,setSurveys]=useState([]);
  const [svName,setSvName]=useState('');
  const [svPhone,setSvPhone]=useState('');
  const [svPicks,setSvPicks]=useState([{u:'',etc:''},{u:'',etc:''},{u:'',etc:''},{u:'',etc:''},{u:'',etc:''},{u:'',etc:''}]);
  const [svTimes,setSvTimes]=useState(new Set());
  const [svErr,setSvErr]=useState('');
  const [svDone,setSvDone]=useState(false);

  useEffect(()=>{load();},[yr,mo]);
  useEffect(()=>{
    function applyHash(){
      try{
        const h=window.location.hash||'';
        const q=window.location.search||'';
        const path=(window.location.pathname||'').replace(/\/+$/,'');
        if(path==='/survey'||h==='#survey'||h==='#/survey'||q.indexOf('survey')>-1) setView('survey');
      }catch(e){}
    }
    applyHash();
    window.addEventListener('hashchange',applyHash);
    return ()=>window.removeEventListener('hashchange',applyHash);
  },[]);

  function toggleSvTime(di,si){
    if(SLOTS[si].fixed) return; // 실시간 풀이 시간은 선택 대상 아님
    const k=`${di}-${si}`;
    setSvTimes(prev=>{const n=new Set(prev); n.has(k)?n.delete(k):n.add(k); return n;});
  }
  function setPick(i,field,val){
    setSvPicks(prev=>prev.map((p,idx)=>idx===i?{...p,[field]:val}:p));
  }
  async function submitSurvey(){
    if(!svName.trim()){setSvErr('이름을 입력해주세요.');return;}
    if(!svPhone.trim()){setSvErr('휴대폰 번호를 입력해주세요.');return;}
    if(!svPicks.some(p=>p.u==='__etc__'?(p.etc||'').trim():p.u)){setSvErr('희망 대학을 1개 이상 선택해주세요.');return;}
    if(svTimes.size===0){setSvErr('가능한 시간을 1개 이상 체크해주세요.');return;}
    setSvErr('');
    const entry={id:Date.now().toString(),name:svName.trim(),phone:svPhone.trim(),
      picks:svPicks.map(p=>({u:p.u==='__etc__'?(p.etc||'').trim():p.u})), times:[...svTimes], at:new Date().toISOString()};
    const next=[...surveys,entry];
    const ok=await ss(svKey(yr,mo),next);
    if(ok){setSurveys(next);setSvDone(true);}else{setSvErr('저장에 실패했어요. 다시 시도해주세요.');}
  }
  async function saveSiteMode(m){
    setSiteMode(m); await ss('r15-site-mode',m);
    setToast(m==='survey'?'수요조사 모드 — 학생에게 시간표가 안 보여요':'수강신청 오픈! 학생이 시간표를 볼 수 있어요');
    setTimeout(()=>setToast(''),2600);
  }
  async function delSurvey(id){
    const next=surveys.filter(x=>x.id!==id);
    await ss(svKey(yr,mo),next);setSurveys(next);
  }
  function openClassFromSlot(di,si){
    if(SLOTS[si].fixed) return;
    setNewCls(p=>({...p,time:slotStart(SLOTS[si].t)}));
    setAdminTab('classes');setAdding(true);
    setToast(`${DAYS[di]}요일 ${slotStart(SLOTS[si].t)} → 날짜와 대학을 입력하세요`);
    setTimeout(()=>setToast(''),3000);
  }

  async function load(){
    setLoading(true);
    const cd=await sg(clsKey(yr,mo));
    if(cd){setCls(cd);}else if(yr===2026&&mo===7){setCls(SAMPLE_AUG);await ss(clsKey(yr,mo),SAMPLE_AUG);}else{setCls([]);}
    const rd=await sg(regKey(yr,mo));setRegs(rd||[]);
    const vd=await sg(vodKey(yr,mo));
    if(vd){setVodList(vd);}else if(yr===2026&&mo===7){setVodList(SAMPLE_VOD);await ss(vodKey(yr,mo),SAMPLE_VOD);}else{setVodList([]);}
    const svd=await sg(svKey(yr,mo));setSurveys(svd||[]);
    const sm=await sg('r15-site-mode');if(sm==='signup'||sm==='survey')setSiteMode(sm);
    const sp=await sg('r15-admin-pw');if(typeof sp==='string'&&sp)setPw(sp);
    const sw=await sg('r15-webhook');if(typeof sw==='string')setWh(sw);
    const pu=await sg('r15-payssam-url');if(typeof pu==='string')setPayssamUrl(pu);
    setLoading(false);
  }

  const dim=(y,m)=>new Date(y,m+1,0).getDate();
  const fd=(y,m)=>new Date(y,m,1).getDay();
  const ds=d=>`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const cfd=d=>cls.filter(c=>c.date===ds(d));
  const fmt=s=>{const d=new Date(s+'T00:00:00');return `${d.getMonth()+1}/${d.getDate()}(${['일','월','화','수','목','금','토'][d.getDay()]})`;}

  function prevMo(){if(mo===0){setYr(y=>y-1);setMo(11);}else setMo(m=>m-1);setSelected(new Set());setSelVOD(new Map());}
  function nextMo(){if(mo===11){setYr(y=>y+1);setMo(0);}else setMo(m=>m+1);setSelected(new Set());setSelVOD(new Map());}
  function toggleSel(id){setSelected(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});}
  function toggleVOD(vod,cheomchak){
    setSelVOD(prev=>{const n=new Map(prev);const cur=n.get(vod.id);
      if(cur&&cur.cheomchak===cheomchak){n.delete(vod.id);}else{n.set(vod.id,{vod,cheomchak});}return n;});
  }
  const selCls=[...selected].map(id=>cls.find(c=>c.id===id)).filter(Boolean);
  const selVODArr=[...selVOD.values()];
  const selCount=selCls.length+selVODArr.length;
  const liveTotal=calcLivePrice(selCls);
  const vodTotal=calcVODTotal(selVODArr);
  const grandTotal=liveTotal+vodTotal;

  async function submitCheckout(){
    if(!sName.trim()){setCoErr('이름을 입력해주세요.');return;}
    if(!sPhone.trim()){setCoErr('휴대폰 번호를 입력해주세요.');return;}
    if(payMethod==='카드'&&!cardPhone.trim()){setCoErr('카드결제자 휴대폰번호를 입력해주세요.');return;}
    setCoErr('');
    const isCard=payMethod==='카드';
    const billId=isCard?newBillId():'';
    const entry={id:Date.now().toString(),studentName:sName.trim(),phone:sPhone.trim(),payMethod,
      cashReceipt:payMethod==='현금'?cashReceipt.trim():'',
      cardPhone:isCard?cardPhone.trim():'',
      classes:selCls.map(c=>({id:c.id,name:c.name,session:c.session,date:c.date,time:c.time||'',notes:c.notes,type:c.type})),
      vodItems:selVODArr.map(i=>({id:i.vod.id,name:i.vod.name,cheomchak:i.cheomchak,price:i.cheomchak?90000:50000})),
      totalWon:grandTotal*10000,at:new Date().toISOString(),
      billId, billStatus:isCard?(payssamUrl?'sending':'manual'):'', shortUrl:''};
    const next=[...regs,entry];
    const ok=await ss(regKey(yr,mo),next);
    if(!ok){setCoErr('저장에 실패했어요.');return;}
    setRegs(next);setDoneTotal(grandTotal);setSelected(new Set());setSelVOD(new Map());setCoDone(true);
    notifyStudent(entry);
    if(wh)try{fetch(wh,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(entry)});}catch{}
    // 카드결제 → 결제선생 청구서 자동 발송
    if(isCard){
      if(!payssamUrl){setBillState('manual');setBillInfo(null);return;}
      setBillState('sending');setBillInfo(null);
      try{
        const productName=[...entry.classes.map(c=>c.name),...entry.vodItems.map(v=>v.name)].join(', ').slice(0,90)||'리마인드 논술 수강료';
        const r=await payssamCall(payssamUrl,'send',{
          billId, memberName:entry.studentName, phone:entry.cardPhone,
          price:String(entry.totalWon), productName, memberCode:entry.phone,
        });
        if(r.ok&&(r.code==='0000'||r.shortUrl)){
          setBillState('sent');setBillInfo({shortUrl:r.shortUrl||'',billId});
          await updateRegById(entry.id,{billStatus:'sent',shortUrl:r.shortUrl||''});
        }else{
          setBillState('failed');setBillInfo({message:r.message||r.msg||'발송 실패'});
          await updateRegById(entry.id,{billStatus:'failed'});
        }
      }catch(e){
        setBillState('failed');setBillInfo({message:'프록시 연결 실패'});
        await updateRegById(entry.id,{billStatus:'failed'});
      }
    }
  }
  function openCheckout(){setCoErr('');setCoDone(false);setPayMethod('카드');setCashReceipt('');setCardPhone('');setBillState('idle');setBillInfo(null);setCheckout(true);}

  async function addCls(){
    if(!newCls.date||!newCls.name.trim())return;
    const c={id:Date.now().toString(),date:newCls.date,time:newCls.time||'',name:newCls.name.trim(),
      session:newCls.session?parseInt(newCls.session):null,type:newCls.type,notes:newCls.notes.trim()};
    const next=[...cls,c].sort((a,b)=>a.date.localeCompare(b.date));
    await ss(clsKey(yr,mo),next);setCls(next);
    setNewCls({date:'',time:'20:00',name:'',session:'',type:'before',notes:''});setAdding(false);
  }
  async function delCls(id){
    const next=cls.filter(c=>c.id!==id);await ss(clsKey(yr,mo),next);setCls(next);
    setSelected(prev=>{const n=new Set(prev);n.delete(id);return n;});
  }
  async function addVOD(){
    if(!newVOD.trim())return;
    const v={id:Date.now().toString(),name:newVOD.trim()};
    const next=[...vodList,v];await ss(vodKey(yr,mo),next);setVodList(next);setNewVOD('');setAddingVOD(false);
  }
  async function delVOD(id){
    const next=vodList.filter(v=>v.id!==id);await ss(vodKey(yr,mo),next);setVodList(next);
    setSelVOD(prev=>{const n=new Map(prev);n.delete(id);return n;});
  }
  async function delReg(id){const next=regs.filter(r=>r.id!==id);await ss(regKey(yr,mo),next);setRegs(next);}
  async function togglePaid(id){
    const next=regs.map(r=>r.id===id?{...r,paid:!r.paid}:r);
    await ss(regKey(yr,mo),next);setRegs(next);
  }
  async function updateRegById(id,patch){
    setRegs(prev=>{const nx=prev.map(r=>r.id===id?{...r,...patch}:r);ss(regKey(yr,mo),nx);return nx;});
  }
  async function resendBill(r){
    if(!payssamUrl||!r.billId)return;
    setToast('재발송 중…');

                  </div>
                </>)}
                {selVODArr.length>0&&(<>
                  <span className="co-sec-t" style={{marginTop:selCls.length>0?8:0}}>📼 VOD 강의 ({selVODArr.length}개)</span>
                  <div className="sel-box">
                    {selVODArr.map(item=>(<div key={item.vod.id} className="sel-item">
                      <span className="sel-nm">{item.vod.name}<span style={{fontSize:11,color:'#bbb',marginLeft:6}}>{item.cheomchak?'첨삭포함':'첨삭미포함'}</span></span>
                      <div style={{display:'flex',alignItems:'center',gap:4}}><span className="sel-pr">{item.cheomchak?9:5}만원</span><button className="sel-x" onClick={()=>toggleVOD(item.vod,item.cheomchak)}>×</button></div>
                    </div>))}
                  </div>
                </>)}
                <div className="price-box">
                  <div><span className="price-lbl">총 수강료</span><span className="price-note">{[selCls.length>0&&`실시간 ${liveTotal}만원`,selVODArr.length>0&&`VOD ${vodTotal}만원`].filter(Boolean).join(' + ')}</span></div>
                  <span className="price-v">{grandTotal}만원</span>
                </div>
                <div className="divhr"/>
                <div className="fg"><label className="lb">이름 *</label><input className="inp" placeholder="홍길동" value={sName} onChange={e=>setSName(e.target.value)}/></div>
                <div className="fg"><label className="lb">휴대폰 번호 *</label><input className="inp" type="tel" placeholder="010-0000-0000" value={sPhone} onChange={e=>setSPhone(e.target.value)}/></div>
                <div className="fg">
                  <label className="lb">결제 방법</label>
                  <div className="pay-row">{['카드','현금'].map(m=>(<button key={m} className={`pay-btn${payMethod===m?' on':''}`} onClick={()=>setPayMethod(m)}>{m}</button>))}</div>
                </div>
                {payMethod==='현금'&&(<div className="fg"><label className="lb">현금영수증 발급번호 <span style={{color:'#bbb',fontWeight:400}}>(선택)</span></label><input className="inp" placeholder="010-0000-0000 또는 사업자번호" value={cashReceipt} onChange={e=>setCashReceipt(e.target.value)}/></div>)}
                {payMethod==='카드'&&(<div className="fg"><label className="lb">카드결제자 휴대폰번호 * <span style={{color:'#bbb',fontWeight:400}}>(부모님)</span></label><input className="inp" type="tel" placeholder="010-0000-0000" value={cardPhone} onChange={e=>setCardPhone(e.target.value)}/><p style={{fontSize:11.5,color:'#bbb',marginTop:5,lineHeight:1.6}}>'결제선생'이라는 이름으로 결제톡이 별도 발송됩니다.</p></div>)}
                {payMethod==='현금'&&(<div className="acct"><div className="acct-t">입금 계좌</div><div className="acct-row"><div><div className="acct-num">3333-33-0167444</div><div className="acct-bank">카카오뱅크 · 리마인드</div></div><button className="acct-cp" onClick={()=>copy('3333-33-0167444')}>복사</button></div></div>)}
                {coErr&&<p className="err">⚠ {coErr}</p>}
                <button className="sub-btn" disabled={selCount===0} onClick={submitCheckout}>신청하기</button>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
<script>
(function(){
  function show(msg){var b=document.getElementById('boot');if(b)b.innerHTML='⚠ 화면 조립 중 오류입니다. 아래 내용을 보여주세요:<br><pre style="white-space:pre-wrap;text-align:left;font-size:12px;color:#c0392b;background:#fff3f3;padding:12px;border-radius:8px;margin-top:12px">'+String(msg)+'</pre>';}
  window.addEventListener('error',function(ev){show(ev.message+(ev.filename?(' @ '+ev.filename+':'+ev.lineno):''));});
  function boot(){
    try{
      if(!window.React||!window.ReactDOM){throw new Error('React 로딩 실패');}
      if(!window.Babel){throw new Error('Babel 로딩 실패');}
      var out=Babel.transform(document.getElementById('appsrc').textContent,{presets:['react']}).code;
      (0,eval)(out);
    }catch(e){show(e&&e.message?e.message:e);}
  }
  if(document.readyState==='complete'||document.readyState==='interactive'){setTimeout(boot,0);}
  else{window.addEventListener('DOMContentLoaded',boot);}
})();
</script>
</body>
</html>
